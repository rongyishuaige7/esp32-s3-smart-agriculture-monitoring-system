; Public build is sensor/OLED observation only. Network and actuator paths are
; compile-time opt-in only; no environment uploads firmware or uses credentials.
[platformio]
default_envs = esp32-s3-public-default

[env]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -std=gnu++17
lib_deps =
  adafruit/DHT sensor library@1.4.6
  adafruit/Adafruit Unified Sensor@1.1.14
  claws/BH1750@1.3.0
  adafruit/Adafruit SSD1306@2.5.9
  adafruit/Adafruit GFX Library@1.11.9
  adafruit/Adafruit BMP280 Library@2.6.8
  fastled/FastLED@3.6.0

[env:esp32-s3-public-default]
build_flags =
  ${env.build_flags}
  -D ENABLE_EXPERIMENTAL_WIFI_TCP=0
  -D ENABLE_EXPERIMENTAL_ACTUATORS=0

[env:esp32-s3-network-telemetry-compile]
build_flags =
  ${env.build_flags}
  -D ENABLE_EXPERIMENTAL_WIFI_TCP=1
  -D ENABLE_EXPERIMENTAL_ACTUATORS=0

[env:esp32-s3-actuator-compile]
build_flags =
  ${env.build_flags}
  -D ENABLE_EXPERIMENTAL_WIFI_TCP=0
  -D ENABLE_EXPERIMENTAL_ACTUATORS=1
